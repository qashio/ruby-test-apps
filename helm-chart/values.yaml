replicaCount: 1

image:
  repository: ruby-test-apps
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: realworld.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

livenessProbe:
  httpGet:
    path: /api/tags
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /api/tags
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 6

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

env:
  railsEnv: production
  railsLogToStdout: "1"
  port: "3000"

# Secrets are not set in chart values — use ESO (env overlay) or a pre-created K8s secret.
# ESO off by default — enable only in env overlays (e.g. ae-prod-values.yaml).
eso:
  enabled: false
  targetSecretName: ""
  waitForSecret: false
  waitForSecretTimeoutSeconds: 300
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager
  remotePathPrefix: ""

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /rails/db

nodeSelector: {}
tolerations: []
affinity: {}
