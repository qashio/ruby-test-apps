# ae-prod overlay — keep in sync with helm-charts:
# apps/production/ruby-test-apps/ae-prod-values.yaml (branch: devops-refactor)
#
# Install:
#   helm upgrade --install ruby-test-apps ./helm-chart \
#     -f helm-chart/values.service.yaml -f helm-chart/ae-prod-values.yaml

namespace: ae-prod-v2

replicaCount: 1

image:
  repository: "609790991041.dkr.ecr.eu-central-1.amazonaws.com/ae-prod/ruby-test-apps"
  tag: "latest"
  pullPolicy: IfNotPresent

env:
  railsEnv: production
  railsLogToStdout: "1"
  port: "3000"

eso:
  enabled: true
  remotePathPrefix: ae-prod-v2/ruby-test-apps
  waitForSecret: true

persistence:
  enabled: false

autoscaling:
  enabled: false
