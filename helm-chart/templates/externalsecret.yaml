{{- if include "ruby-test-apps.esoEnabled" . }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "ruby-test-apps.fullname" . }}-eso
  labels:
    {{- include "ruby-test-apps.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: {{ .Values.eso.refreshInterval | default "5m" }}
  secretStoreRef:
    name: {{ .Values.eso.secretStoreRef.name | default "aws-secretsmanager" }}
    kind: {{ .Values.eso.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "ruby-test-apps.fullname" . }}
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: {{ .Values.eso.remotePath | quote }}
{{- end }}
