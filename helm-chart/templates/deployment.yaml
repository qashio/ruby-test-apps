apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ruby-test-apps.fullname" . }}
  namespace: {{ include "ruby-test-apps.namespace" . }}
  labels:
    {{- include "ruby-test-apps.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ruby-test-apps.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ruby-test-apps.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ruby-test-apps.serviceAccountName" . }}
      {{- if include "ruby-test-apps.esoWaitForSecret" . }}
      initContainers:
      - name: wait-for-secret
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Waiting for {{ include "ruby-test-apps.esoTargetSecretName" . }}..."
          timeout={{ default 300 .Values.eso.waitForSecretTimeoutSeconds }}
          elapsed=0
          while [ "$(ls -A /mnt/app-secrets 2>/dev/null | wc -l)" -eq 0 ]; do
            sleep 3
            elapsed=$((elapsed + 3))
            if [ "$elapsed" -ge "$timeout" ]; then
              echo "Timed out waiting for {{ include "ruby-test-apps.esoTargetSecretName" . }}"
              exit 1
            fi
          done
          echo "{{ include "ruby-test-apps.esoTargetSecretName" . }} available."
        volumeMounts:
        - name: app-secrets
          mountPath: /mnt/app-secrets
          readOnly: true
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.env.port | int }}
              protocol: TCP
          env:
            - name: RAILS_ENV
              value: {{ .Values.env.railsEnv | quote }}
            - name: RAILS_LOG_TO_STDOUT
              value: {{ .Values.env.railsLogToStdout | quote }}
            - name: PORT
              value: {{ .Values.env.port | quote }}
          envFrom:
            - secretRef:
                name: {{ include "ruby-test-apps.appSecretName" . }}
                optional: {{ not (include "ruby-test-apps.esoEnabled" .) }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
      volumes:
      {{- if include "ruby-test-apps.esoWaitForSecret" . }}
      - name: app-secrets
        secret:
          secretName: {{ include "ruby-test-apps.esoTargetSecretName" . }}
          optional: true
      {{- end }}
      {{- if .Values.persistence.enabled }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "ruby-test-apps.fullname" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
