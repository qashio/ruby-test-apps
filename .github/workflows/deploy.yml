name: deploy

# Required GitHub Environment variables (per environment, e.g. ae-prod):
#   vars.AWS_REGION, vars.AWS_ROLE_TO_ASSUME, vars.ECR_REPOSITORY
#   vars.HELM_CHARTS_REPO, vars.HELM_CHART_PATH
#   vars.HELM_CHARTS_REF (default: zeroandone — helm-charts Git branch for GitOps writes)
#
# Required secret for helm-charts GitOps (checkout + push to zeroandone):
#   secrets.HELM_REPO_TOKEN — PAT with repo write access on qashio/helm-charts

on:
  push:
    branches:
      - ae-dev
      - ae-uat
      - ae-preprod
      - ae-prod
      - eu-dev
      - eu-uat
      - eu-preprod
      - eu-prod
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Override image tag (leave blank to use {branch}-{commit-sha})'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            IMAGE_TAG="${{ github.ref_name }}"
          else
            IMAGE_TAG="${{ github.ref_name }}-${{ github.sha }}"
          fi
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "ECR image tag: ${IMAGE_TAG}"

  build:
    name: Build & Push to ECR
    needs: [prepare]
    uses: ./.github/workflows/build-ci.yml
    secrets: inherit
    with:
      image_tag: ${{ inputs.image_tag || needs.prepare.outputs.image_tag }}

  update-manifest:
    name: Update Helm Manifest (GitOps)
    runs-on: ubuntu-latest
    needs: [prepare, build]
    environment: ${{ github.ref_name }}

    env:
      IMAGE_TAG: ${{ inputs.image_tag || needs.prepare.outputs.image_tag }}
      ENVIRONMENT: ${{ github.ref_name }}
      HELM_CHARTS_REPO: ${{ vars.HELM_CHARTS_REPO }}
      HELM_CHARTS_REF: ${{ vars.HELM_CHARTS_REF || 'zeroandone' }}
      HELM_CHART_PATH: ${{ vars.HELM_CHART_PATH }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

    steps:
      - name: Validate required configuration
        env:
          HELM_REPO_TOKEN: ${{ secrets.HELM_REPO_TOKEN }}
        run: |
          MISSING=()
          [[ -z "$HELM_CHARTS_REPO" ]] && MISSING+=("vars.HELM_CHARTS_REPO")
          [[ -z "$HELM_CHART_PATH"  ]] && MISSING+=("vars.HELM_CHART_PATH")
          [[ -z "$ECR_REPOSITORY"   ]] && MISSING+=("vars.ECR_REPOSITORY")
          [[ -z "$HELM_REPO_TOKEN"  ]] && MISSING+=("secrets.HELM_REPO_TOKEN")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "ERROR: Missing required configuration for environment '$ENVIRONMENT':" >&2
            printf '  - %s\n' "${MISSING[@]}" >&2
            exit 1
          fi
          echo "Configuration OK — ${HELM_CHARTS_REPO} @ ${HELM_CHARTS_REF} (HELM_REPO_TOKEN)"

      - name: Checkout Helm charts repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HELM_CHARTS_REPO }}
          ref: ${{ env.HELM_CHARTS_REF }}
          token: ${{ secrets.HELM_REPO_TOKEN }}
          path: helm-charts

      - name: Modify deployment manifest
        working-directory: helm-charts
        env:
          HELM_REPO_TOKEN: ${{ secrets.HELM_REPO_TOKEN }}
        run: |
          VALUES_FILE="${HELM_CHART_PATH}"
          if [[ ! -f "$VALUES_FILE" ]]; then
            echo "ERROR: Values file not found: $VALUES_FILE" >&2
            echo "Create it on branch ${HELM_CHARTS_REF} in ${HELM_CHARTS_REPO}" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          sed -i "s|^  repository:.*|  repository: \"${ECR_REPOSITORY}\"|" "$VALUES_FILE"
          sed -i "s|^  tag:.*|  tag: \"${IMAGE_TAG}\"|" "$VALUES_FILE"

          git add "$VALUES_FILE"
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "deploy(ruby-test-apps): update ${ENVIRONMENT} image to ${IMAGE_TAG}"
          git push "https://x-access-token:${HELM_REPO_TOKEN}@github.com/${HELM_CHARTS_REPO}.git" "HEAD:${HELM_CHARTS_REF}"

      - name: Job summary
        run: |
          {
            echo "### Manifest updated"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Image tag | \`${IMAGE_TAG}\` |"
            echo "| Environment | \`${ENVIRONMENT}\` |"
            echo "| Helm repo | \`${HELM_CHARTS_REPO}\` |"
            echo "| Helm branch | \`${HELM_CHARTS_REF}\` |"
            echo "| Values file | \`${HELM_CHART_PATH}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
