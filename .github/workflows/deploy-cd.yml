name: Deploy CD

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Image tag (commit SHA) to deploy'
        required: true
        type: string
      namespace:
        description: 'Kubernetes namespace (branch name)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (commit SHA) to deploy'
        required: true
        type: string
      namespace:
        description: 'Kubernetes namespace (branch name)'
        required: true
        type: string

jobs:
  deploy:
    name: Deploying to Kubernetes
    runs-on: ubuntu-latest
    environment: ${{ inputs.namespace || github.event.inputs.namespace || github.ref_name }}
    concurrency:
      group: deploy-${{ inputs.namespace || github.event.inputs.namespace || github.ref_name }}
      cancel-in-progress: false

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          if [[ -z "${{ secrets.KUBECONFIG }}" ]]; then
            echo "ERROR: KUBECONFIG secret is not set in GitHub Environment: ${{ inputs.namespace || github.event.inputs.namespace || github.ref_name }}" >&2
            exit 1
          fi

          if echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml 2>/dev/null; then
            echo "KUBECONFIG decoded from base64"
          else
            echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml
            echo "KUBECONFIG used as plain text"
          fi

          if [[ ! -s kubeconfig.yaml ]]; then
            echo "ERROR: kubeconfig.yaml is empty or was not created" >&2
            exit 1
          fi

          chmod 600 kubeconfig.yaml
          export KUBECONFIG=$(pwd)/kubeconfig.yaml

          if ! kubectl config view --minify >/dev/null 2>&1; then
            echo "ERROR: kubeconfig.yaml is invalid or cannot be read by kubectl" >&2
            exit 1
          fi

          echo "Verifying cluster connection..."
          kubectl cluster-info --request-timeout=10s || {
            echo "WARNING: Could not verify cluster connection, but continuing with deployment..."
          }

      - name: Determine deployment parameters
        id: params
        run: |
          if [[ -n "${{ inputs.namespace }}" ]]; then
            NAMESPACE="${{ inputs.namespace }}"
          elif [[ -n "${{ github.event.inputs.namespace }}" ]]; then
            NAMESPACE="${{ github.event.inputs.namespace }}"
          else
            NAMESPACE="${{ github.ref_name }}"
          fi

          if [[ -n "${{ vars.AWS_REGION }}" ]]; then
            REGION="${{ vars.AWS_REGION }}"
          else
            echo "ERROR: vars.AWS_REGION is not set for environment '${{ inputs.namespace || github.event.inputs.namespace || github.ref_name }}'" >&2
            exit 1
          fi

          if [[ "$NAMESPACE" == *-dev ]]; then
            RAILS_ENV="development"
          elif [[ "$NAMESPACE" == *-uat ]] || [[ "$NAMESPACE" == *-preprod ]]; then
            RAILS_ENV="staging"
          elif [[ "$NAMESPACE" == *-prod ]]; then
            RAILS_ENV="production"
          else
            RAILS_ENV="production"
          fi

          if [[ -n "${{ inputs.image_tag }}" ]]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
          elif [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          else
            IMAGE_TAG="${{ github.sha }}"
          fi

          echo "namespace=$NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "aws_region=$REGION" >> "$GITHUB_OUTPUT"
          echo "rails_env=$RAILS_ENV" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Validate Helm charts branch exists
        env:
          GH_TOKEN: ${{ secrets.HELM_REPO_TOKEN || github.token }}
        run: |
          HELM_CHARTS_REPO="${{ vars.HELM_CHARTS_REPO || 'qashio/helm-charts' }}"
          HELM_CHARTS_REF="${{ steps.params.outputs.namespace }}"

          echo "Checking Helm charts ref '${HELM_CHARTS_REF}' in ${HELM_CHARTS_REPO}..."
          STATUS_CODE="$(curl -sS -o /tmp/helm-branch.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${HELM_CHARTS_REPO}/branches/${HELM_CHARTS_REF}")"

          if [[ "$STATUS_CODE" == "200" ]]; then
            echo "Branch '${HELM_CHARTS_REF}' found in ${HELM_CHARTS_REPO}"
          elif [[ "$STATUS_CODE" == "401" || "$STATUS_CODE" == "403" ]]; then
            echo "ERROR: No access to ${HELM_CHARTS_REPO}. Configure HELM_REPO_TOKEN with repo read access." >&2
            cat /tmp/helm-branch.json >&2 || true
            exit 1
          else
            echo "ERROR: Branch '${HELM_CHARTS_REF}' not found in ${HELM_CHARTS_REPO} (HTTP ${STATUS_CODE})" >&2
            echo "Create matching branch in helm-charts repo or set vars.HELM_CHARTS_REPO appropriately." >&2
            cat /tmp/helm-branch.json >&2 || true
            exit 1
          fi

      - name: Checkout Helm charts repo (same branch)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.HELM_CHARTS_REPO || 'qashio/helm-charts' }}
          ref: ${{ steps.params.outputs.namespace }}
          path: helm-charts
          token: ${{ secrets.HELM_REPO_TOKEN || github.token }}

      - name: Deploy with Helm
        run: |
          export KUBECONFIG=$(pwd)/kubeconfig.yaml
          RELEASE_NAME="${{ vars.HELM_RELEASE_NAME || vars.PIPELINE_APP_NAME || github.event.repository.name }}"
          CHART_PATH="${{ vars.HELM_CHART_PATH || './helm-charts/services/rails-api-backend' }}"
          NAMESPACE="${{ steps.params.outputs.namespace }}"
          HELM_VALUES_FILE="${{ vars.HELM_VALUES_FILE || '' }}"

          EXISTING_RELEASE="$(kubectl -n "$NAMESPACE" get sa rails-api-sa -o jsonpath='{.metadata.annotations.meta\.helm\.sh/release-name}' 2>/dev/null || true)"
          if [[ -n "$EXISTING_RELEASE" ]]; then
            echo "Detected existing Helm release owner from ServiceAccount: $EXISTING_RELEASE"
            RELEASE_NAME="$EXISTING_RELEASE"
          fi

          if [[ ! -f "$CHART_PATH/Chart.yaml" ]]; then
            echo "ERROR: Helm chart not found at $CHART_PATH" >&2
            echo "Set vars.HELM_CHART_PATH if your chart path differs." >&2
            exit 1
          fi

          if [[ ! -f "$CHART_PATH/values.yaml" ]]; then
            echo "ERROR: Chart base values missing: $CHART_PATH/values.yaml" >&2
            exit 1
          fi

          VALUES_ARGS=(--values "$CHART_PATH/values.yaml")
          OVERLAY=""
          if [[ -n "$HELM_VALUES_FILE" ]]; then
            if [[ ! -f "$HELM_VALUES_FILE" ]]; then
              echo "ERROR: Configured HELM_VALUES_FILE does not exist: $HELM_VALUES_FILE" >&2
              exit 1
            fi
            OVERLAY="$HELM_VALUES_FILE"
          elif [[ -f "$CHART_PATH/${NAMESPACE}-values.yaml" ]]; then
            OVERLAY="$CHART_PATH/${NAMESPACE}-values.yaml"
          elif [[ -f "$CHART_PATH/values-${NAMESPACE}.yaml" ]]; then
            OVERLAY="$CHART_PATH/values-${NAMESPACE}.yaml"
          elif [[ -f "$CHART_PATH/values/${NAMESPACE}.yaml" ]]; then
            OVERLAY="$CHART_PATH/values/${NAMESPACE}.yaml"
          fi

          if [[ -z "$OVERLAY" ]]; then
            echo "ERROR: No env overlay values file for namespace ${NAMESPACE}." >&2
            echo "       On helm-charts branch ${NAMESPACE}, add $CHART_PATH/${NAMESPACE}-values.yaml (or set vars.HELM_VALUES_FILE)." >&2
            exit 1
          fi
          VALUES_ARGS+=(--values "$OVERLAY")
          echo "Helm -f order: values.yaml then ${OVERLAY##*/}"

          CURRENT_STATUS="$(helm status "$RELEASE_NAME" -n "$NAMESPACE" -o json 2>/dev/null | python3 -c 'import json,sys; print(json.load(sys.stdin).get("info",{}).get("status",""))' 2>/dev/null || true)"
          if [[ "$CURRENT_STATUS" == pending-* ]]; then
            echo "Detected Helm release status '$CURRENT_STATUS'. Rolling back to last deployed revision..." >&2
            LAST_DEPLOYED_REV="$(helm history "$RELEASE_NAME" -n "$NAMESPACE" -o json 2>/dev/null | python3 -c 'import json,sys; rows=json.load(sys.stdin); deployed=[str(r.get("revision")) for r in rows if str(r.get("status","")).lower()=="deployed"]; print(deployed[-1] if deployed else "")' 2>/dev/null || true)"
            if [[ -z "$LAST_DEPLOYED_REV" ]]; then
              echo "ERROR: Release is locked in '$CURRENT_STATUS' and no deployed revision exists." >&2
              exit 1
            fi
            helm rollback "$RELEASE_NAME" "$LAST_DEPLOYED_REV" -n "$NAMESPACE" --wait --timeout 10m
          fi

          kubectl -n "$NAMESPACE" annotate externalsecret rails-app-secrets \
            meta.helm.sh/release-name="$RELEASE_NAME" \
            meta.helm.sh/release-namespace="$NAMESPACE" --overwrite 2>/dev/null || true
          kubectl -n "$NAMESPACE" label externalsecret rails-app-secrets \
            app.kubernetes.io/managed-by=Helm --overwrite 2>/dev/null || true

          kubectl -n "$NAMESPACE" annotate externalsecret rails-app-params \
            meta.helm.sh/release-name="$RELEASE_NAME" \
            meta.helm.sh/release-namespace="$NAMESPACE" --overwrite 2>/dev/null || true
          kubectl -n "$NAMESPACE" label externalsecret rails-app-params \
            app.kubernetes.io/managed-by=Helm --overwrite 2>/dev/null || true

          set +e
          UPGRADE_OUTPUT="$(helm upgrade --install "$RELEASE_NAME" "$CHART_PATH" \
            --namespace "$NAMESPACE" \
            --create-namespace \
            "${VALUES_ARGS[@]}" \
            --set image.tag="${{ steps.params.outputs.image_tag }}" \
            --wait \
            --wait-for-jobs \
            --timeout 10m 2>&1)"
          UPGRADE_EXIT=$?
          set -e

          if [[ $UPGRADE_EXIT -ne 0 ]]; then
            echo "$UPGRADE_OUTPUT" >&2
            echo "" >&2
            echo "Helm upgrade failed. Not auto-rolling back." >&2
            echo "Inspect the latest migrate hook job and pod logs:" >&2
            echo "  kubectl -n \"$NAMESPACE\" get jobs -l app.kubernetes.io/instance=$RELEASE_NAME --sort-by=.metadata.creationTimestamp" >&2
            echo "  kubectl -n \"$NAMESPACE\" get pods -l app.kubernetes.io/component=db-migrate --sort-by=.metadata.creationTimestamp" >&2
            echo "  kubectl -n \"$NAMESPACE\" logs -l app.kubernetes.io/component=db-migrate --all-containers --tail=200" >&2
            exit 1
          fi

  dns-validation:
    name: DNS validation
    runs-on: ubuntu-latest
    needs: [deploy]
    if: ${{ needs.deploy.result == 'success' }}
    environment: ${{ inputs.namespace || github.event.inputs.namespace || github.ref_name }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Configure kubeconfig
        run: |
          if [[ -z "${{ secrets.KUBECONFIG }}" ]]; then
            echo "ERROR: KUBECONFIG secret is not set in GitHub Environment." >&2
            exit 1
          fi

          if echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml 2>/dev/null; then
            echo "KUBECONFIG decoded from base64"
          else
            echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml
            echo "KUBECONFIG used as plain text"
          fi

          if [[ ! -s kubeconfig.yaml ]]; then
            echo "ERROR: kubeconfig.yaml is empty or missing" >&2
            exit 1
          fi

          chmod 600 kubeconfig.yaml
          export KUBECONFIG=$(pwd)/kubeconfig.yaml
          kubectl config view --minify >/dev/null

      - name: Determine deployment parameters
        id: params
        run: |
          if [[ -n "${{ github.event.inputs.namespace }}" ]]; then
            NAMESPACE="${{ github.event.inputs.namespace }}"
          elif [[ -n "${{ inputs.namespace }}" ]]; then
            NAMESPACE="${{ inputs.namespace }}"
          else
            NAMESPACE="${{ github.ref_name }}"
          fi

          if [[ -n "${{ vars.AWS_REGION }}" ]]; then
            REGION="${{ vars.AWS_REGION }}"
          else
            echo "ERROR: vars.AWS_REGION is not set for environment '${{ inputs.namespace || github.event.inputs.namespace || github.ref_name }}'" >&2
            exit 1
          fi

          echo "namespace=$NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "aws_region=$REGION" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ steps.params.outputs.aws_region }}

      - name: Upsert Route53 record from Ingress host (dynamic)
        run: |
          set -euo pipefail
          export KUBECONFIG=$(pwd)/kubeconfig.yaml

          HOSTED_ZONE_ID="${{ vars.HOSTED_ZONE_ID_NONPROD }}"
          if [[ -z "$HOSTED_ZONE_ID" ]]; then
            echo "ERROR: vars.HOSTED_ZONE_ID_NONPROD must be set in GitHub Environment." >&2
            exit 1
          fi

          APP_NS="${{ steps.params.outputs.namespace }}"
          RELEASE_NAME="${{ vars.HELM_RELEASE_NAME || vars.PIPELINE_APP_NAME || github.event.repository.name }}"
          INGRESS_SVC_NS="${{ vars.ROUTE53_INGRESS_SERVICE_NAMESPACE || 'nginx-external' }}"
          INGRESS_SVC_NAME="${{ vars.ROUTE53_INGRESS_SERVICE_NAME || 'nginx-external-ingress-nginx-controller' }}"

          echo "Waiting for ingress controller LB hostname..."
          LB_HOSTNAME=""
          for i in {1..60}; do
            LB_HOSTNAME="$(kubectl -n "$INGRESS_SVC_NS" get svc "$INGRESS_SVC_NAME" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
            [[ -n "$LB_HOSTNAME" ]] && break
            sleep 5
          done

          if [[ -z "$LB_HOSTNAME" ]]; then
            echo "ERROR: No LB hostname found on ${INGRESS_SVC_NS}/${INGRESS_SVC_NAME}" >&2
            kubectl -n "$INGRESS_SVC_NS" get svc "$INGRESS_SVC_NAME" -o wide || true
            exit 1
          fi

          echo "Discovering Ingress host in namespace ${APP_NS} for release ${RELEASE_NAME}..."
          INGRESS_HOST="$(kubectl -n "$APP_NS" get ingress \
            -l app.kubernetes.io/instance="$RELEASE_NAME" \
            -o jsonpath='{.items[0].spec.rules[0].host}' 2>/dev/null || true)"

          if [[ -z "$INGRESS_HOST" ]]; then
            INGRESS_HOST="$(kubectl -n "$APP_NS" get ingress "$RELEASE_NAME" -o jsonpath='{.spec.rules[0].host}' 2>/dev/null || true)"
          fi

          if [[ -z "$INGRESS_HOST" ]]; then
            INGRESS_HOST="$(kubectl -n "$APP_NS" get ingress -o jsonpath='{.items[0].spec.rules[0].host}' 2>/dev/null || true)"
          fi

          if [[ -z "$INGRESS_HOST" ]]; then
            echo "ERROR: Could not discover ingress host in namespace ${APP_NS}" >&2
            kubectl -n "$APP_NS" get ingress -o wide || true
            exit 1
          fi

          NAME="${INGRESS_HOST}."
          VALUE="${LB_HOSTNAME}."

          echo "Upserting Route53 CNAME: ${NAME} -> ${VALUE}"
          aws route53 change-resource-record-sets \
            --hosted-zone-id "${HOSTED_ZONE_ID}" \
            --change-batch "{
              \"Comment\": \"CD upsert ${NAME} -> ${VALUE}\",
              \"Changes\": [{
                \"Action\": \"UPSERT\",
                \"ResourceRecordSet\": {
                  \"Name\": \"${NAME}\",
                  \"Type\": \"CNAME\",
                  \"TTL\": 60,
                  \"ResourceRecords\": [{\"Value\": \"${VALUE}\"}]
                }
              }]
            }"

          echo "DNS updated. You can test: nslookup ${INGRESS_HOST}"
