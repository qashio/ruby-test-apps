name: Build CI

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Image tag (commit SHA) to build'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (commit SHA) to build'
        required: true
        type: string

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}

    permissions:
      id-token: write
      contents: read

    env:
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
      image_repository: ${{ steps.tag.outputs.image_repository }}
      image_ref: ${{ steps.meta.outputs.image_ref }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine AWS region from branch
        id: region
        run: |
          if [[ -n "${{ vars.AWS_REGION }}" ]]; then
            REGION="${{ vars.AWS_REGION }}"
            echo "Using AWS_REGION from GitHub vars: $REGION"
          else
            echo "ERROR: vars.AWS_REGION is not set for environment '${{ github.ref_name }}'" >&2
            exit 1
          fi
          echo "aws_region=$REGION" >> "$GITHUB_OUTPUT"
          echo "AWS_REGION=$REGION" >> "$GITHUB_ENV"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ steps.region.outputs.aws_region }}

      - name: Verify AWS caller identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR (using OIDC)
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify ECR_REPOSITORY is set
        run: |
          if [[ -z "$ECR_REPOSITORY" ]]; then
            echo "ERROR: ECR_REPOSITORY environment variable is not set!" >&2
            echo "Please ensure ECR_REPOSITORY is set in GitHub Environment: ${{ github.ref_name }}" >&2
            exit 1
          fi
          echo "ECR_REPOSITORY is set: $ECR_REPOSITORY"

      - name: Compute image tag from commit
        id: tag
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            SHA_TAG="${{ inputs.image_tag }}"
          else
            SHA_TAG="${GITHUB_SHA}"
          fi

          if [[ -z "$ECR_REPOSITORY" ]]; then
            echo "ERROR: ECR_REPOSITORY is not set. Check GitHub Environment variables." >&2
            exit 1
          fi

          echo "value=$SHA_TAG" >> "$GITHUB_OUTPUT"
          echo "image_tag=$SHA_TAG" >> "$GITHUB_OUTPUT"
          echo "image_repository=$ECR_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "ECR repository: $ECR_REPOSITORY"
          echo "Image tag: $SHA_TAG"

      - name: Compute image reference
        id: meta
        run: |
          IMAGE_REF="${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.image_tag }}"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REF=$IMAGE_REF" >> "$GITHUB_ENV"
          echo "Image ref: $IMAGE_REF"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: "${{ steps.meta.outputs.image_ref }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max
